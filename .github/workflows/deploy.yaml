name: Deploy to Strato/Hosting

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and upload to remote host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Install transfer tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y lftp rsync sshpass

      - name: Upload (FTPS or SFTP)
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.NAME }}
          FTP_PASSWORD: ${{ secrets.PASSWORD }}
          DEPLOY_PROTOCOL: ${{ secrets.DEPLOY_PROTOCOL }}
          LOCAL_DIR: './dist/'
          REMOTE_DIR: '${{ secrets.REMOTE_DIR }}'
        run: |
          set -e
          echo "Using protocol: ${DEPLOY_PROTOCOL:-sftp}"
          if [ "${DEPLOY_PROTOCOL,,}" = "ftps" ]; then
            # FTPS (FTP over TLS) using lftp
            echo "Uploading via FTPS to $FTP_HOST"
            lftp -c "open -u ${FTP_USER},${FTP_PASSWORD} ftps://${FTP_HOST}; set ftp:ssl-force true; set ftp:ssl-protect-data true; mirror -R --parallel=2 --verbose ${LOCAL_DIR} ${REMOTE_DIR:-/}; quit"
          else
            # Default to SFTP using rsync over SSH
            echo "Uploading via SFTP/SSH to $FTP_HOST"
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            touch ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
            ssh-keyscan -H "$FTP_HOST" >> ~/.ssh/known_hosts || true
            SSH_OPTS="-o StrictHostKeyChecking=yes"
            sshpass -p "${FTP_PASSWORD}" rsync -avz -e "ssh $SSH_OPTS -p ${REMOTE_PORT:-22}" --delete ${LOCAL_DIR} ${FTP_USER}@${FTP_HOST}:${REMOTE_DIR:-/}
          fi

      - name: Confirm
        run: echo "Deploy finished"
